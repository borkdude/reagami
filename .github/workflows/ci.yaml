name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache deps
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run squint tests
        run: |
          pnpm test

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Run shadow tests tests
        run: |
          pnpm shadow-cljs compile reagami
          node lib/tests.js

      - name: Run lite-mode tests
        run: |
          pnpm shadow-cljs compile reagami --config-merge '{:compiler-options {:lite-mode true :elide-to-string true}}'
          node lib/tests.js

      - name: Build lite-app and check gzip size
        run: |
          pnpm shadow-cljs release lite-app --config-merge '{:compiler-options {:lite-mode true :elide-to-string true}}'
          size=$(gzip -9 -c target/lite-app/js/main.js | wc -c | tr -d ' ')
          echo "lite-app gzip size: $size bytes"
          test "$size" -lt 22000
